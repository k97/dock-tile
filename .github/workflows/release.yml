name: Release

# Triggered only by version tags (v*), not by branch pushes
# Website changes (website/**, vercel.json) don't affect this workflow
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create releases

env:
  SCHEME: DockTile
  PROJECT: DockTile.xcodeproj
  APP_NAME: "Dock Tile"
  APP_NAME_NO_SPACE: DockTile

jobs:
  # Run tests first - release only proceeds if tests pass
  test:
    name: Run Tests
    # Use macos-26 beta (Tahoe) to match local development environment
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Try to use Xcode 26.2 (matches local dev environment)
          if [ -d "/Applications/Xcode_26.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project $PROJECT \
            -scheme $SCHEME \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ./build \
            -only-testing:DockTileTests \
            CODE_SIGNING_ALLOWED='NO' \
            | xcpretty --color

  build-and-release:
    name: Build, Sign & Release
    # Use macos-26 beta (Tahoe) to match local development environment
    runs-on: macos-26
    needs: test  # Only run if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Try to use Xcode 26.2 (matches local dev environment)
          if [ -d "/Applications/Xcode_26.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build Release
        run: |
          xcodebuild \
            -project $PROJECT \
            -scheme $SCHEME \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})" \
            build

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          APP_PATH="./build/Build/Products/Release/${APP_NAME}.app"

          # Sign with hardened runtime
          codesign --force --deep --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements DockTile/DockTile.entitlements \
            "$APP_PATH"

          # Verify signature
          codesign --verify --deep --strict "$APP_PATH"
          echo "App signed successfully"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          ./Scripts/create-dmg.sh \
            --app-path "./build/Build/Products/Release/${APP_NAME}.app" \
            --output-dir . \
            --version ${{ steps.version.outputs.VERSION }}

          echo "DMG created: ${APP_NAME_NO_SPACE}-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        timeout-minutes: 360
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="${APP_NAME_NO_SPACE}-${{ steps.version.outputs.VERSION }}.dmg"

          echo "Submitting $DMG_NAME for notarization..."

          # Submit and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "./$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --output-format json)

          echo "Submit output: $SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Poll for completion with custom loop (more control than --wait)
          # 720 attempts × 30 seconds = 6 hours max
          echo "Waiting for notarization to complete (max 6 hours)..."
          for i in {1..720}; do
            sleep 30

            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --output-format json 2>/dev/null || echo '{"status":"Unknown"}')

            STATUS=$(echo "$STATUS_OUTPUT" | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', 'Unknown'))")
            echo "Attempt $i/480: Status = $STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "Notarization failed with status: $STATUS"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD"
              exit 1
            fi
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization timed out with status: $STATUS"
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "./$DMG_NAME"
          echo "DMG notarized and stapled successfully"

      - name: Regenerate checksum after notarization
        run: |
          # Checksum must be regenerated after stapling (file changed)
          DMG_NAME="${APP_NAME_NO_SPACE}-${{ steps.version.outputs.VERSION }}.dmg"
          shasum -a 256 "./$DMG_NAME" > "./${DMG_NAME}.sha256"
          echo "Checksum regenerated after notarization"
          cat "./${DMG_NAME}.sha256"

      - name: Sign update for Sparkle
        id: sparkle
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          set -euxo pipefail
          DMG_NAME="${APP_NAME_NO_SPACE}-${{ steps.version.outputs.VERSION }}.dmg"

          # Ensure xz is available (may not be on all macOS runners)
          which xz || brew install xz

          # Download Sparkle tools (SPM artifacts don't include CLI tools)
          SPARKLE_VERSION="2.9.0"
          echo "Downloading Sparkle ${SPARKLE_VERSION} tools..."
          curl -sL -o /tmp/sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          ls -la /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          ls /tmp/sparkle/bin/
          SIGN_TOOL="/tmp/sparkle/bin/sign_update"
          chmod +x "$SIGN_TOOL"

          # Sign the DMG with EdDSA (-p flag outputs only the signature, no metadata)
          SIGNATURE=$(printf '%s' "$SPARKLE_EDDSA_KEY" | "$SIGN_TOOL" "./$DMG_NAME" --ed-key-file - -p)
          DMG_SIZE=$(stat -f%z "./$DMG_NAME")

          echo "SPARKLE_SIGNATURE=${SIGNATURE}" >> $GITHUB_OUTPUT
          echo "DMG_SIZE=${DMG_SIZE}" >> $GITHUB_OUTPUT
          echo "Sparkle EdDSA signature generated (${DMG_SIZE} bytes)"

      - name: Update appcast
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Read build number from xcconfig (source of truth for CURRENT_PROJECT_VERSION)
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION' DockTile/Config/Base.xcconfig | sed 's/.*= *//')
          DMG_URL="https://github.com/k97/dock-tile/releases/download/v${VERSION}/${APP_NAME_NO_SPACE}-${VERSION}.dmg"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          ./Scripts/generate-appcast-entry.sh \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --dmg-url "$DMG_URL" \
            --signature "${{ steps.sparkle.outputs.SPARKLE_SIGNATURE }}" \
            --size "${{ steps.sparkle.outputs.DMG_SIZE }}" \
            --pub-date "$PUB_DATE" \
            --output website/public/appcast.xml

      - name: Update website config
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DMG_URL="https://github.com/k97/dock-tile/releases/download/v${VERSION}/${APP_NAME_NO_SPACE}-${VERSION}.dmg"
          RELEASE_URL="https://github.com/k97/dock-tile/releases/tag/v${VERSION}"

          # Update download URL, release notes URL, and version in website config
          sed -i '' "s|downloadUrl: \".*\"|downloadUrl: \"${DMG_URL}\"|" website/lib/config.ts
          sed -i '' "s|releaseNotesUrl: \".*\"|releaseNotesUrl: \"${RELEASE_URL}\"|" website/lib/config.ts
          sed -i '' "s|latestVersion: \".*\"|latestVersion: \"${VERSION}\"|" website/lib/config.ts

          echo "Updated website config to v${VERSION}"

      - name: Commit website updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/appcast.xml website/lib/config.ts
          if ! git diff --staged --quiet; then
            git commit -m "chore: update website for v${{ steps.version.outputs.VERSION }}"
            git push origin HEAD:main
          else
            echo "No website changes to commit"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Dock Tile ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./${{ env.APP_NAME_NO_SPACE }}-${{ steps.version.outputs.VERSION }}.dmg
            ./${{ env.APP_NAME_NO_SPACE }}-${{ steps.version.outputs.VERSION }}.dmg.sha256
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
